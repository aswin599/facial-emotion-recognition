version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fer-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: facial_emotion_recognition
    volumes:
      - mongodb_data:/data/db
    networks:
      - fer-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fer-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/facial_emotion_recognition
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost:3000
      - INFERENCE_SERVICE_URL=http://inference:8000
    depends_on:
      - mongodb
    networks:
      - fer-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Inference Service
  inference:
    build:
      context: ./inference-service
      dockerfile: Dockerfile
    container_name: fer-inference
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=/app/models/emotion_model.h5
    networks:
      - fer-network
    volumes:
      - ./inference-service/models:/app/models

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fer-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - fer-network

networks:
  fer-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
